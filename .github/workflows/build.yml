name: Build Preview (Feature Branch)
on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - 'dist/**'
      - 'README.md'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Repository (preview URL)
        run: |
          npm install -g skystream-cli
          skystream deploy -u https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}

      - name: Commit and Push to same branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: preview build [${{ github.ref_name }}] [skip ci]" || echo "No changes to commit"
          git push