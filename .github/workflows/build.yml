name: Build and Deploy Repository (Test)
on:
  push:
    branches: [ fix-plugins ]
    paths-ignore:
      - 'dist/**'
      - 'README.md'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install -g skystream-cli
          # 1. Ubah URL agar mengarah ke build-test
          skystream deploy -u https://raw.githubusercontent.com/${{ github.repository }}/build-test
          # 2. Sesuaikan path sed dengan nama branch baru
          sed -i 's|/build-test/dist/|/build-test/|g' dist/*.json

      - name: Deploy to build branch
        run: |
          # Pindahkan (bukan copy) dist ke folder sementara agar lenyap dari repo
          mv dist /tmp/build_result
          
          # 3. Ganti dan buat branch build-test
          git checkout -B build-test
          
          # Hapus file tracked
          git rm -rf . || true
          
          # Hapus bersih semua file untracked yang tersisa (termasuk node_modules)
          git clean -fdx
          
          # Kembalikan HANYA isi dari build_result
          cp -r /tmp/build_result/* .
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: automated test deploy [skip ci]" || echo "No changes"
          
          # 4. Push ke branch build-test
          git push origin build-test --force