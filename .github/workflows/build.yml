name: Build and Deploy Repository
on:
  push:
    branches: [ add-plugin ]
    paths-ignore:
      - 'dist/**'
      - 'README.md'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install -g skystream-cli
          # Mengubah target URL deploy agar mengarah ke branch build-test
          skystream deploy -u https://raw.githubusercontent.com/${{ github.repository }}/build-test
          sed -i 's|/build-test/dist/|/build-test/|g' dist/*.json

      - name: Deploy to build-test branch
        run: |
          # 1. Pindahkan (bukan copy) dist ke folder sementara agar lenyap dari repo
          mv dist /tmp/build_result
          
          # 2. Checkout ke branch build-test secara paksa
          git checkout -B build-test
          
          # 3. Hapus file tracked
          git rm -rf . || true
          
          # 4. Hapus bersih semua file untracked yang tersisa
          git clean -fdx
          
          # 5. Kembalikan HANYA isi dari build_result
          cp -r /tmp/build_result/* .
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: automated deploy to build-test [skip ci]" || echo "No changes"
          
          # 6. Push paksa ke branch build-test
          git push origin build-test --force